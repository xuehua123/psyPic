services:
  postgres:
    image: ${POSTGRES_IMAGE:-postgres:17-bookworm}
    container_name: psypic-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: unless-stopped
    networks:
      - psypic_net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: ${REDIS_IMAGE:-redis:7-alpine}
    container_name: psypic-redis
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD}
    command: sh -c 'redis-server --appendonly yes --requirepass "$$REDIS_PASSWORD"'
    volumes:
      - redisdata:/data
    restart: unless-stopped
    networks:
      - psypic_net
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a \"$$REDIS_PASSWORD\" ping | grep PONG"]
      interval: 10s
      timeout: 5s
      retries: 10

  app:
    build:
      context: .
      args:
        NODE_IMAGE: ${NODE_IMAGE:-node:22-bookworm-slim}
    container_name: psypic-app
    env_file: ${PSYPIC_ENV_FILE:-.env.production}
    ports:
      - "${PSYPIC_APP_HOST:-0.0.0.0}:3000:3000"
    volumes:
      - appdata:/app/.data
      - appoutput:/app/output
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - psypic_net
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://127.0.0.1:3000/api/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\""]
      interval: 30s
      timeout: 10s
      retries: 5

volumes:
  pgdata:
  redisdata:
  appdata:
  appoutput:

networks:
  psypic_net:
    name: psypic_net
