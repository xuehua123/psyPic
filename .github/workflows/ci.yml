name: CI

on:
  push:
    branches:
      - main
  pull_request:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  quality:
    name: 质量检查
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: postgresql://psypic:psypic@localhost:5432/psypic
    steps:
      - name: 检出代码
        uses: actions/checkout@v5

      - name: 安装 pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.30.2

      - name: 安装 Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: pnpm

      - name: 安装依赖
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Test
        run: pnpm test

      - name: Prisma schema 校验
        run: pnpm prisma validate

      - name: Build
        run: pnpm build
