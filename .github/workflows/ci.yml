name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  quality:
    name: 质量检查
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: postgresql://psypic:psypic@localhost:5432/psypic
    steps:
      - name: 检出代码
        uses: actions/checkout@v5

      - name: 安装 Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 24
          package-manager-cache: false

      - name: 启用 Corepack
        run: corepack enable

      - name: 固定 pnpm 版本
        run: corepack prepare pnpm@10.30.2 --activate

      - name: 安装依赖
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Test
        run: pnpm test

      - name: Prisma schema 校验
        run: pnpm prisma validate

      - name: Build
        run: pnpm build
